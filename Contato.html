<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Diego Pereira</title>
    <link rel="stylesheet" href="css/Portfólio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="Script.js" defer></script>
</head>
<body>
    <div id="header">
        <div id="logo"><h1>Diego Pereira<span class="blue"> DEV</span></h1></div>
        <div id="menu">
            <a href="index.html">Home</a>
            <a href="Sobre.html">Sobre</a>
            <a href="Projetos.html">Projetos</a>
            <a href="Contato.html">Contato</a>
        </div>
    </div>

    <div id="content">
        <h1>Entre em contato</h1>
        <p>Preencha o formulário abaixo e fale comigo:</p>

        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email">

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>

            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
